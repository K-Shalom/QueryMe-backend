# Database Configuration
spring:
  application:
    name: QueryMe-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:queryme_app}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
queryme:
  app:
    jwtSecret: ${JWT_SECRET:QueryMeApplicationSecretKeyMustBeLongEnoughForHMACSHA256SignatureAlgorithm}
    jwtExpirationMs: ${JWT_EXPIRATION:86400000}